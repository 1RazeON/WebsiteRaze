<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Zombie Survival</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    overflow:hidden;
    background:#090909;
    width:100%;
    height:100%;

    font-family:Arial,Helvetica,sans-serif;

}

canvas{

    position:absolute;
    left:0;
    top:0;

    width:100%;
    height:100%;

}

#loading{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    color:white;

    font-size:32px;

    text-align:center;

    z-index:1000;

}

#loading span{

    color:#00ff66;

}

#hud{

position:absolute;

top:15px;
left:15px;

display:flex;

gap:15px;

z-index:500;

}

.panel{

background:rgba(0,0,0,.55);

border:2px solid #00ff66;

border-radius:14px;

padding:12px 18px;

color:white;

min-width:140px;

backdrop-filter:blur(10px);

box-shadow:

0 0 10px #00ff66,

0 0 25px rgba(0,255,100,.3);

}

.panel h2{

font-size:18px;

margin-bottom:8px;

}

.value{

font-size:26px;

font-weight:bold;

}

#crosshair{

position:absolute;

width:22px;
height:22px;

border:2px solid white;

border-radius:50%;

pointer-events:none;

transform:translate(-50%,-50%);

z-index:999;

}

#crosshair::after{

content:"";

position:absolute;

left:50%;
top:50%;

width:2px;
height:22px;

background:white;

transform:translate(-50%,-50%);

}

#crosshair::before{

content:"";

position:absolute;

left:50%;
top:50%;

width:22px;
height:2px;

background:white;

transform:translate(-50%,-50%);

}

#damage{

position:absolute;

left:0;
top:0;

width:100%;
height:100%;

background:red;

opacity:0;

pointer-events:none;

transition:.15s;

z-index:900;

}

#menu{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:420px;

background:rgba(15,15,15,.92);

border-radius:20px;

padding:35px;

border:2px solid #00ff66;

box-shadow:0 0 30px #00ff66;

text-align:center;

color:white;

z-index:800;

}

#menu h1{

font-size:48px;

margin-bottom:10px;

color:#00ff66;

}

#menu p{

opacity:.8;

margin-bottom:30px;

}

button{

width:100%;

padding:16px;

margin-top:10px;

font-size:22px;

cursor:pointer;

border:none;

border-radius:12px;

background:#00ff66;

transition:.25s;

font-weight:bold;

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div id="loading">

<span>Lade Zombie Survival...</span>

</div>

<div id="damage"></div>

<div id="crosshair"></div>

<div id="hud">

<div class="panel">

<h2>❤️ Leben</h2>

<div class="value" id="health">100</div>

</div>

<div class="panel">

<h2>💰 Geld</h2>

<div class="value" id="money">0</div>

</div>

<div class="panel">

<h2>🌊 Welle</h2>

<div class="value" id="wave">1</div>

</div>

<div class="panel">

<h2>🔫 Waffe</h2>

<div class="value" id="weapon">Pistole</div>

</div>

</div>

<div id="menu">

<h1>ZOMBIE SURVIVAL</h1>

<p>

Überlebe so viele Wellen wie möglich.

</p>

<button id="playButton">

SPIEL STARTEN

</button>

</div>

<canvas id="game"></canvas>

<script src="game.js"></script>

<script>

const cross=document.getElementById("crosshair");

window.addEventListener("mousemove",(e)=>{

cross.style.left=e.clientX+"px";

cross.style.top=e.clientY+"px";

});

</script>

</body>
</html>
